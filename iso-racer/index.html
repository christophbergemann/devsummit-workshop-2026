<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Iso Racer — Arcade Isometric Racing</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: #0a0a14;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        outline: none;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: radial-gradient(circle at 50% 40%, #1a1a3e, #0a0a14);
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #loading h1 {
        font-size: 3rem;
        letter-spacing: 0.3rem;
        margin: 0;
        text-shadow: 0 0 20px #4af;
      }
      #loading p {
        color: #88a;
        letter-spacing: 0.2rem;
      }
      .spinner {
        margin-top: 1rem;
        width: 40px;
        height: 40px;
        border: 4px solid #2a2a4e;
        border-top-color: #4af;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>ISO RACER</h1>
      <p>LOADING…</p>
      <div class="spinner"></div>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
